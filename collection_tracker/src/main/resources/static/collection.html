<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Collezione Carte</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
        header { background: #1f4e99; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #cardGrid { display: flex; flex-wrap: wrap; gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 8px; width: 180px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: auto; border-radius: 4px; }
        .card-info { margin-top: 5px; font-size: 14px; }
        .quantity-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
        .quantity-controls button { width: 25px; height: 25px; cursor: pointer; }
        #addCardBtn { padding: 8px 12px; cursor: pointer; background: #1f4e99; color: white; border: none; border-radius: 4px; }
        #usernameDisplay { font-weight: bold; }
    </style>
</head>
<body>
<header>
    <span id="usernameDisplay">👤 Utente</span>
    <div>
        <button id="addCardBtn">➕ Aggiungi carta</button>
        <button id="logoutBtn">Logout</button>
    </div>
</header>

<div id="cardGrid">
    <!-- Qui vengono renderizzate le carte -->
</div>

<script src="collection.js"></script>
</body>
</html>
