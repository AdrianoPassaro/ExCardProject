<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Collezione Carte</title>
    <link rel="stylesheet" href="collection.css">
    <link rel="stylesheet" href="navbar-shared.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard Logo" class="logo-img"
             onerror="this.style.display='none'">
    </a>

    <form class="search-form" action="http://localhost:8084/search-results.html" method="get">
        <input type="text" name="q" placeholder="Cerca una carta…" autocomplete="off">
        <button type="submit" aria-label="Cerca">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </form>

    <div class="nav-buttons">
        <a href="http://localhost:8085/wallet.html" class="wallet-pill" id="walletPill">
            <span>💳</span><span id="walletAmount">—</span>
        </a>
        <a href="http://localhost:8087/cart.html" class="cart-icon-btn" title="Carrello">
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>
        <div class="user-menu-wrap">
            <button class="user-menu-trigger" id="userMenuTrigger">
                <span id="usernameDisplay">Utente</span>
                <span class="chevron">▼</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
                <a href="http://localhost:8081/account.html" class="dd-item">👤 Profilo</a>
                <a href="http://localhost:8083/collection.html" class="dd-item">🃏 Collezione</a>
                <a href="http://localhost:8086/orders.html" class="dd-item">📦 Ordini</a>
                <a href="http://localhost:8088/trades.html" class="dd-item">🔄 Scambi</a>
                <a href="http://localhost:8085/wallet.html" class="dd-item">💳 Wallet</a>
                <hr class="dd-divider">
                <button class="dd-item dd-logout" id="logoutBtn">🚪 Logout</button>
            </div>
        </div>
    </div>
</nav>

<!-- HERO HEADER -->
<div class="page-header">
    <div class="page-header-inner">
        <div class="page-header-text">
            <h1 class="page-title">La mia Collezione</h1>
            <p class="page-subtitle" id="collectionStats">— carte nel tuo archivio</p>
        </div>
        <button class="btn btn-add" id="addCardBtn">
            <span class="btn-icon">＋</span>
            Aggiungi carta
        </button>
    </div>
</div>

<!-- FILTERS BAR -->
<div class="filters-bar" id="filtersBar">
    <div class="filters-inner">

        <div class="filter-search-wrap">
            <span class="filter-search-icon">⌕</span>
            <input type="text" id="filterSearch" class="filter-search" placeholder="Cerca nella collezione…">
        </div>

        <div class="filters-selects">
            <div class="filter-group">
                <label class="filter-label">Rarità</label>
                <select id="filterRarity" class="filter-select">
                    <option value="">Tutte</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Set</label>
                <select id="filterSet" class="filter-select">
                    <option value="">Tutti</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Condizione</label>
                <select id="filterCondition" class="filter-select">
                    <option value="">Tutte</option>
                    <option value="Near Mint">Near Mint</option>
                    <option value="Lightly Played">Lightly Played</option>
                    <option value="Moderately Played">Moderately Played</option>
                    <option value="Heavily Played">Heavily Played</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Ordina per</label>
                <select id="filterSort" class="filter-select">
                    <option value="name-asc">Nome A–Z</option>
                    <option value="name-desc">Nome Z–A</option>
                    <option value="qty-desc">Quantità ↓</option>
                    <option value="qty-asc">Quantità ↑</option>
                    <option value="rarity">Rarità</option>
                </select>
            </div>
        </div>

        <button class="filter-reset" id="resetFilters" title="Resetta filtri">✕ Reset</button>
    </div>

    <!-- ACTIVE FILTER CHIPS -->
    <div class="active-filters" id="activeFilters"></div>
</div>

<!-- RESULTS COUNT -->
<div class="results-bar" id="resultsBar"></div>

<!-- CARD GRID -->
<div id="cardGrid"></div>

<!-- EMPTY STATE -->
<div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🃏</div>
    <p class="empty-title">Nessuna carta trovata</p>
    <p class="empty-sub">Prova a modificare i filtri di ricerca</p>
</div>

<script src="collection.js"></script>
<script src="navbar.js"></script>
</body>
</html>
