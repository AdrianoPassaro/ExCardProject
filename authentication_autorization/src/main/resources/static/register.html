<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExCard - Registrazione</title>
    <link rel="stylesheet" href="../../../../../css/stile.css">
    <link rel="stylesheet" href="../../../../../css/account.css">
</head>
<body>
<nav class="navbar">
    <a href="homepage.html" class="logo">ExCard</a>
    <div class="nav-buttons">
        <a href="login.html" class="btn">Accedi</a>
    </div>
</nav>

<main class="main-content">
    <div class="form-card">
        <h2 class="form-title">Crea il tuo Account</h2>

        <form action="/register" method="POST" autocomplete="on">

            <fieldset class="form-section">
                <legend class="section-legend">Dati Personali</legend>
                <div class="grid-layout">
                    <div class="field-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="field-group">
                        <label for="cognome">Cognome</label>
                        <input type="text" id="cognome" name="cognome" required>
                    </div>
                    <div class="field-group">
                        <label for="dataNascita">Data di Nascita</label>
                        <input type="date" id="dataNascita" name="dataNascita" required>
                    </div>
                    <div class="field-group">
                        <label for="telefono">Telefono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="333 123 4567" required>
                    </div>
                    <div class="field-group span-full">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend class="section-legend">Indirizzo di Spedizione</legend>
                <div class="grid-layout">
                    <div class="field-group span-full">
                        <label for="via">Via / Piazza e Numero</label>
                        <input type="text" id="via" name="via" placeholder="Es: Via Roma 12" required>
                    </div>
                    <div class="field-group">
                        <label for="citta">Città</label>
                        <input type="text" id="citta" name="citta" required>
                    </div>
                    <div class="field-group">
                        <label for="cap">CAP</label>
                        <input type="text" id="cap" name="cap" pattern="[0-9]{5}" inputmode="numeric" required>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend class="section-legend">Sicurezza</legend>
                <div class="grid-layout">
                    <div class="field-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    <div class="field-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" minlength="8" required autocomplete="new-password">
                            <button type="button" id="togglePassword" class="edit-icon" aria-label="Mostra password">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle id="eyePupil" cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                </div>
            </fieldset>

            <button type="submit" class="action-btn">Registrati ora</button>

            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem;">
                Hai già un account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Accedi qui</a>
            </p>
        </form>
    </div>
</main>
</body>
</html>
