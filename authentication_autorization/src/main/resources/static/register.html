<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExCard — Registrati</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard" class="logo-img"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="logo-text" style="display:none">ExCard</span>
    </a>

    <form class="search-form" action="http://localhost:8084/search-results.html" method="get">
        <input type="text" name="q" placeholder="Cerca una carta…" autocomplete="off">
        <button type="submit" aria-label="Cerca">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </form>

    <div class="nav-right">
        <a href="http://localhost:8080/login.html" class="btn btn-outline">Accedi</a>
    </div>
</nav>

<main class="auth-page auth-page-wide">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <h1 class="auth-title">Crea il tuo account</h1>
            <p class="auth-sub">Unisciti alla community di collezionisti ExCard</p>
        </div>

        <form id="registerForm" autocomplete="on">

            <!-- DATI PERSONALI -->
            <div class="form-section">
                <div class="form-section-title">Dati personali</div>
                <div class="form-grid">
                    <div class="field-group">
                        <label class="field-label" for="nome">Nome</label>
                        <input type="text" id="nome" class="field-input" placeholder="Mario" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="cognome">Cognome</label>
                        <input type="text" id="cognome" class="field-input" placeholder="Rossi" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="dataNascita">Data di nascita</label>
                        <input type="date" id="dataNascita" class="field-input" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="telefono">Telefono</label>
                        <input type="tel" id="telefono" class="field-input" placeholder="333 123 4567" required>
                    </div>
                    <div class="field-group field-full">
                        <label class="field-label" for="email">Email</label>
                        <input type="email" id="email" class="field-input" placeholder="mario@email.it"
                               required autocomplete="email">
                    </div>
                </div>
            </div>

            <!-- INDIRIZZO -->

                <div class="form-section-title">Indirizzo di spedizione</div>
                <div class="form-grid">
                    <div class="field-group field-full">
                        <label class="field-label" for="indirizzo">Via / Piazza e numero</label>
                        <input type="text" id="indirizzo" class="field-input" placeholder="Via Roma 12" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="citta">Città</label>
                        <input type="text" id="citta" class="field-input" placeholder="Roma" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="cap">CAP</label>
                        <input type="text" id="cap" class="field-input" placeholder="00100"
                               pattern="[0-9]{5}" inputmode="numeric" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="provincia">Provincia</label>
                        <input type="text" id="provincia" class="field-input" placeholder="RM"
                               maxlength="2" style="text-transform:uppercase">
                    </div>
                    <div class="form-group">

            <div class="form-section">
                <div class="form-section-title">Credenziali di accesso</div>
                <div class="form-grid">
                    <div class="field-group field-full">
                        <label class="field-label" for="username">Username</label>
                        <input type="text" id="username" class="field-input" placeholder="username_unico"
                               required autocomplete="username">
                    </div>
                    <div class="field-group field-full">
                        <label class="field-label" for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="field-input"
                                   placeholder="Almeno 8 caratteri" minlength="8"
                                   required autocomplete="new-password">
                            <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostra password">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                     stroke-linejoin="round" viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle id="eyePupil" cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-error" id="formError" style="display:none"></div>

            <button type="submit" class="auth-btn" id="submitBtn">Crea account</button>
        </form>

        <p class="auth-footer">
            Hai già un account?
            <a href="http://localhost:8080/login.html" class="auth-link">Accedi qui</a>

</html>
