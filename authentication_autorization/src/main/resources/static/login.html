<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExCard: Login</title>
    <link rel="stylesheet" href="../../../../../css/stile.css" />
    <link rel="stylesheet" href="../../../../../css/account.css">
</head>
<body>
<nav class="navbar">
    <a href="homepage.html" class="logo">ExCard</a>
</nav>

<main class="main-content">
    <div class="form-card small-card">
        <h2 class="form-title">Bentornato</h2>

        <form action="/login" method="POST" autocomplete="on">

            <div class="field-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="action-btn">Accedi</button>

            <p class="form-footer" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Nuovo su ExCard? <a href="register.html" style="color: var(--primary); font-weight: 600;">Crea un account</a>
            </p>
        </form>
    </div>
</main>

<script src="../../../../../javascript/login.js"></script>
</body>
</html>
