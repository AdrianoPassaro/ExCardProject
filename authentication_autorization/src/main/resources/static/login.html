<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExCard — Accedi</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR minimal (no auth buttons) -->
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard" class="logo-img"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="logo-text" style="display:none">ExCard</span>
    </a>

    <form class="search-form" action="http://localhost:8084/search-results.html" method="get">
        <input type="text" name="q" placeholder="Cerca una carta…" autocomplete="off">
        <button type="submit" aria-label="Cerca">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </form>

    <div class="nav-right">
        <a href="http://localhost:8080/register.html" class="btn btn-outline">Registrati</a>
    </div>
</nav>

<!-- FORM -->
<main class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Bentornato</h1>
            <p class="auth-sub">Accedi al tuo account ExCard</p>
        </div>

        <form id="loginForm" autocomplete="on">
            <div class="field-group">
                <label class="field-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="field-input"
                       placeholder="Il tuo username" required autocomplete="username">
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" class="field-input"
                           placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostra password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                             stroke-linejoin="round" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle id="eyePupil" cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-error" id="formError" style="display:none"></div>

            <button type="submit" class="auth-btn" id="submitBtn">Accedi</button>
        </form>

        <p class="auth-footer">
            Nuovo su ExCard?
            <a href="http://localhost:8080/register.html" class="auth-link">Crea un account</a>
        </p>
    </div>
</main>

<script src="login.js"></script>
</body>
</html>
