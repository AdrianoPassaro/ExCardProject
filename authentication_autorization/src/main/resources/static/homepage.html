<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExCard: Homepage</title>
    <link rel="stylesheet" href="stile.css" />
</head>
<body>

<!-- HEADER FISSO -->
<header class="navbar">
    <a href="homepage.html" class="logo">ExCard</a>

    <form class="search-bar" action="http://localhost:8084/search-results.html" method="get">
        <input type="text" name="q" placeholder="Cerca un prodotto..."/>
        <button type="submit">🔍</button>
    </form>

    <div class="nav-buttons">
        <a href="login.html" class="btn">Login</a>
        <a href="register.html" class="btn">Registrati</a>
    </div>
</header>

<!-- CONTENUTO DI PAGINA -->
<main class="main-content">
    <div id="guest-content">
        <h1>Benvenuto su ExCard</h1>
        <p class="slogan">Il marketplace definitivo per collezionisti di carte</p>
        <p class="sub-message">Fai il login per accedere a tutte le funzionalità</p>
    </div>

    <div id="user-content" class="hidden">
        <h1>Benvenuto su ExCard</h1>
        <div class="action-grid">
            <a href="http://localhost:8081/account.html" class="action-card">
                <div class="action-title">Profilo</div>
            </a>
            <div class="action-card">
                <div class="action-title">Vendi</div>
            </div>
            <div class="action-card">
                <div class="action-title">Scambia</div>
            </div>
            <a href="http://localhost:8083/collection.html" class="action-card">
                <div class="action-title">La tua collezione</div>
            </a>
        </div>
    </div>
</main>
<script src="homepage.js"></script>
</body>
</html>
