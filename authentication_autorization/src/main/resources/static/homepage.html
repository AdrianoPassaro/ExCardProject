<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExCard: Homepage</title>
    <link rel="stylesheet" href="../../../../../css/stile.css" />
</head>
<body>

<nav class="navbar">
    <a href="homepage.html" class="logo">ExCard</a>

    <form class="search-container" action="/search" method="GET">
        <input type="text" placeholder="Cerca carte, espansioni..." name="q">
        <button type="submit">🔍</button>
    </form>

    <div class="nav-buttons">
        <div id="guest-nav">
            <a href="login.html" class="btn">Accedi</a>
            <a href="register.html" class="btn">Registrati</a>
        </div>
        <div id="user-nav" class="hidden">
            <span id="welcome-msg">Ciao, <strong id="user-name">Utente</strong></span>
            <a href="account.html" class="btn">Profilo</a>
            <button id="logoutBtn" class="btn btn-outline">Logout</button>
        </div>
    </div>
</nav>

<main class="main-content">
    <section id="guest-hero" class="hero-card">
        <h1>Benvenuto su ExCard</h1>
        <p>Il marketplace definitivo per i collezionisti di carte TCG.</p>
        <div class="hero-actions">
            <a href="register.html" class="action-btn">Inizia ora</a>
        </div>
    </section>

    <section id="user-dashboard" class="hidden">
        <h2 class="section-title">Cosa vuoi fare oggi?</h2>
        <div class="action-grid">
            <a href="account.html" class="dashboard-card">
                <span class="icon">👤</span>
                <h3>Gestisci Profilo</h3>
            </a>
            <div class="dashboard-card">
                <span class="icon">🃏</span>
                <h3>Le mie Carte</h3>
            </div>
            <div class="dashboard-card">
                <span class="icon">🛒</span>
                <h3>Marketplace</h3>
            </div>
        </div>
    </section>
</main>
<script src="../../../../../javascript/homepage.js"></script>
</body>
</html>
