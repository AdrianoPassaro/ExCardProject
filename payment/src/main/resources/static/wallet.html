<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wallet — ExCard</title>
    <link rel="stylesheet" href="wallet.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard Logo" class="logo-img">
    </a>
    <div class="nav-buttons">
        <a href="http://localhost:8081/account.html" class="btn btn-user" id="usernameDisplay">👤 Utente</a>
        <a href="http://localhost:8087/cart.html" class="cart-icon-btn" title="Carrello">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>
        <button class="btn btn-logout" id="logoutBtn">Logout</button>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="page-header-inner">
        <div class="page-header-text">
            <h1 class="page-title">Wallet</h1>
            <p class="page-subtitle">Gestisci il tuo saldo ExCard</p>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="wallet-layout">

    <!-- BALANCE CARD -->
    <div class="balance-card">
        <div class="balance-label">Saldo disponibile</div>
        <div class="balance-amount" id="balanceDisplay">—</div>
        <div class="balance-sub">Utilizzabile per acquisti sul marketplace</div>
    </div>

    <!-- LOYALTY CARD -->
    <div class="loyalty-card">
        <div class="loyalty-header">
            <span class="loyalty-title">⭐ Punti fedeltà</span>
            <span class="loyalty-points" id="loyaltyDisplay">0 pt</span>
        </div>
        <div class="loyalty-hint">Guadagni 3 punti per ogni € speso · 100 punti = € 1.00 di sconto sulla spedizione</div>
    </div>

    <!-- RECHARGE CARD -->
    <div class="recharge-card">
        <h2 class="section-title">Ricarica wallet</h2>

        <div class="preset-amounts">
            <button class="preset-btn" data-amount="10">€ 10</button>
            <button class="preset-btn" data-amount="25">€ 25</button>
            <button class="preset-btn" data-amount="50">€ 50</button>
            <button class="preset-btn" data-amount="100">€ 100</button>
        </div>

        <div class="custom-amount-wrap">
            <label class="input-label" for="customAmount">Oppure inserisci un importo</label>
            <div class="amount-input-row">
                <span class="currency-symbol">€</span>
                <input type="number" id="customAmount" class="amount-input"
                       placeholder="0.00" min="1" step="0.01">
            </div>
        </div>

        <div class="recharge-error" id="rechargeError" style="display:none"></div>

        <button class="btn-recharge" id="rechargeBtn">Ricarica</button>

        <p class="recharge-note">Il saldo viene aggiunto istantaneamente al tuo account.</p>
    </div>

</div>

<script src="wallet.js"></script>
</body>
</html>
