  function log(msg, type = "ok") {
    const div = document.getElementById("log");
    div.innerHTML += `<p class="${type}">${msg}</p>`;
  }

  async function seedDatabase() {
    const btn = document.getElementById("seedBtn");
    btn.disabled = true;
    document.getElementById("log").innerHTML = "";

    log("🚀 Inizio inserimento carte...");

    let ok = 0, fail = 0;

    for (const card of cards) {
      try {
        const res = await fetch("/cards", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(card)
        });

        if (res.ok) {
          log(`✅ Inserita: ${card.name}`);
          ok++;
        } else {
          const txt = await res.text();
          log(`⚠️ ${card.name}: ${res.status} - ${txt}`, "err");
          fail++;
        }
      } catch (e) {
        log(`❌ Errore su ${card.name}: ${e.message}`, "err");
        fail++;
      }
    }

    log(`<br><strong>Fine: ${ok} inserite, ${fail} errori.</strong>`);
    btn.disabled = false;
  }
