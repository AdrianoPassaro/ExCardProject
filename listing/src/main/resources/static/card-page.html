<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Carta</title>
    <link rel="stylesheet" href="css/card-page.css">
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <h1 class="logo">ExCard</h1>
        <nav>
            <a href="/homepage.html">Home</a>
            <a href="/login.html">Login</a>
            <a href="/register.html">Registrazione</a>
        </nav>
    </div>
</header>

<main class="page-container">
    <section class="card-info-box">
        <div class="card-image-wrapper">
            <img id="cardImage" src="" alt="Immagine carta">
        </div>

        <div class="card-details">
            <h2 id="cardName">Caricamento...</h2>
            <p><strong>Set:</strong> <span id="cardSet"></span></p>
            <p><strong>Numero:</strong> <span id="cardNumber"></span></p>
            <p><strong>Rarità:</strong> <span id="cardRarity"></span></p>

            <button id="sellButton" class="sell-button">Vendi</button>
        </div>
    </section>

    <section id="sellFormSection" class="sell-form-section hidden">
        <h3>Crea un annuncio di vendita</h3>

        <form id="sellForm">
            <div class="form-row">
                <label for="condition">Condizione</label>
                <select id="condition" required>
                    <option value="">Seleziona</option>
                    <option value="Mint">Mint</option>
                    <option value="Near Mint">Near Mint</option>
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                    <option value="Played">Played</option>
                    <option value="Poor">Poor</option>
                </select>
            </div>

            <div class="form-row">
                <label for="quantity">Quantità</label>
                <input type="number" id="quantity" min="1" required>
            </div>

            <div class="form-row">
                <label for="price">Prezzo (€)</label>
                <input type="number" id="price" min="0" step="0.01" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="confirm-button">Conferma annuncio</button>
            </div>
        </form>

        <p id="sellMessage" class="sell-message"></p>
    </section>

    <section class="listing-section">
        <div class="listing-section-header">
            <h3>Annunci di vendita</h3>
            <button id="sortPriceButton" class="sort-button">Ordina per prezzo ↑</button>
        </div>

        <div class="listing-header-row">
            <div>Venditore</div>
            <div>Condizione</div>
            <div>Quantità</div>
            <div>Prezzo</div>
            <div>Azione</div>
        </div>

        <div id="listingContainer"></div>
    </section>
</main>

<script src="js/card-page.js"></script>
</body>
</html>
