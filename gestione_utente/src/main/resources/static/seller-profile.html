<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Profilo Venditore</title>
  <link rel="stylesheet" href="seller-profile.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">
  <a href="http://localhost:8080/homepage.html" class="logo">
    <img src="logo.png" alt="ExCard Logo" class="logo-img">
  </a>

  <div class="nav-buttons">
    <a href="http://localhost:8080/login.html" class="btn btn-user">Login</a>
    <a href="http://localhost:8080/register.html" class="btn btn-user">Registrati</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-header-text">
      <h1 class="page-title" id="sellerUsername">Venditore</h1>
    </div>

    <div class="contact-popover-wrap">
      <button class="btn btn-contact" id="contactButton" type="button">Contatta</button>

      <div class="contact-popover hidden" id="contactPopover">
        <div class="contact-popover-arrow"></div>
        <div class="contact-popover-content">
          <span class="contact-popover-label">Email venditore</span>
          <span class="contact-popover-email" id="contactEmailText">Non disponibile</span>
        </div>
      </div>
    </div>
  </div>
</div>

<section class="profile-info-panel">
  <div class="profile-info-inner">
    <div class="profile-info-card profile-info-card-name">
      <span class="profile-info-label">Nome</span>
      <span class="profile-info-value">
                <span id="infoNome">-</span> <span id="infoCognome">-</span>
            </span>
    </div>

    <div class="profile-info-card">
      <span class="profile-info-label">Valutazione</span>
      <span class="profile-info-value" id="infoRating">0.0 ★</span>
    </div>

    <div class="profile-info-card">
      <span class="profile-info-label">Vendite concluse</span>
      <span class="profile-info-value" id="infoSales">0</span>
    </div>
  </div>
</section>

<div class="filters-bar" id="filtersBar">
  <div class="filters-inner">

    <div class="profile-tabs">
      <button class="profile-tab active" id="tabOffers">Offerte</button>
      <button class="profile-tab" id="tabCollection">Collezione</button>
    </div>

    <div class="filter-search-wrap">
      <span class="filter-search-icon">⌕</span>
      <input type="text" id="filterSearch" class="filter-search" placeholder="Cerca…">
    </div>

    <div class="filters-selects" id="offersFilters">
      <div class="filter-group">
        <label class="filter-label">Condizione</label>
        <select id="filterCondition" class="filter-select">
          <option value="">Tutte</option>
          <option value="Mint">Mint</option>
          <option value="Near Mint">Near Mint</option>
          <option value="Excellent">Excellent</option>
          <option value="Good">Good</option>
          <option value="Played">Played</option>
          <option value="Poor">Poor</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Ordina per</label>
        <select id="filterSortOffers" class="filter-select">
          <option value="price-asc">Prezzo ↑</option>
          <option value="price-desc">Prezzo ↓</option>
          <option value="name-asc">Nome A–Z</option>
          <option value="name-desc">Nome Z–A</option>
        </select>
      </div>
    </div>

    <div class="filters-selects hidden" id="collectionFilters">
      <div class="filter-group">
        <label class="filter-label">Rarità</label>
        <select id="filterRarity" class="filter-select">
          <option value="">Tutte</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Set</label>
        <select id="filterSet" class="filter-select">
          <option value="">Tutti</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Condizione</label>
        <select id="filterCollectionCondition" class="filter-select">
          <option value="">Tutte</option>
          <option value="Mint">Mint</option>
          <option value="Near Mint">Near Mint</option>
          <option value="Excellent">Excellent</option>
          <option value="Good">Good</option>
          <option value="Played">Played</option>
          <option value="Poor">Poor</option>
          <option value="Lightly Played">Lightly Played</option>
          <option value="Moderately Played">Moderately Played</option>
          <option value="Heavily Played">Heavily Played</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Ordina per</label>
        <select id="filterSortCollection" class="filter-select">
          <option value="name-asc">Nome A–Z</option>
          <option value="name-desc">Nome Z–A</option>
          <option value="qty-desc">Quantità ↓</option>
          <option value="qty-asc">Quantità ↑</option>
          <option value="rarity">Rarità</option>
        </select>
      </div>
    </div>

    <button class="filter-reset" id="resetFilters" title="Resetta filtri">✕ Reset</button>
  </div>

  <div class="active-filters" id="activeFilters"></div>
</div>

<div class="results-bar" id="resultsBar"></div>

<section id="offersSection">
  <div class="seller-listings-wrapper">
    <div class="seller-listings-header-row">
      <div>Carta</div>
      <div>Condizione</div>
      <div>Quantità</div>
      <div>Prezzo</div>
      <div>Azione</div>
    </div>
    <div id="listingContainer"></div>
  </div>
</section>

<section id="collectionSection" class="hidden">
  <div id="collectionGrid"></div>
</section>

<div class="empty-state" id="emptyState" style="display:none">
  <div class="empty-icon">🃏</div>
  <p class="empty-title">Nessun elemento trovato</p>
  <p class="empty-sub">Prova a modificare i filtri di ricerca</p>
</div>

<script src="seller-profile.js"></script>
</body>
</html>
