<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profilo utente</title>
    <style>
        :root {
            --primary: #1f4e99;
            --accent: #b3d1ff;
            --bg: #e0f0ff;
            --border-radius: 6px;
            --gap: 1rem;
            --font-size: 0.85rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: auto;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            padding-top: 70px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--accent);
            box-shadow: 0 2px 8px rgba(0, 60, 130, 0.1);
            z-index: 1000;
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-buttons .btn {
            background-color: var(--primary);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: var(--border-radius);
            text-decoration: none;
            font-size: var(--font-size);
            font-weight: 600;
            border: 2px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
            transition: background-color 0.3s ease;
        }

        .nav-buttons .btn:hover {
            background-color: #003d80;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
        }

        .profile-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .profile-title {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .profile-field {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color: #f5f5f5;
            gap: 10px;
        }

        .profile-field label {
            flex: 1;
            font-weight: bold;
            min-width: 100px;
        }

        .profile-field input {
            flex: 2;
            min-width: 180px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .profile-field input:disabled {
            background-color: #f5f5f5;
            border: none;
            cursor: default;
        }

        .profile-field input.modified {
            background-color: #fff3cd;
            border-color: #ffeeba;
        }

        .edit-btn {
            margin-left: 10px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            line-height: 1;
            padding: 0 5px;
            color: var(--primary);
            transition: transform 0.2s;
        }

        .edit-btn:hover {
            transform: scale(1.1);
            color: #003d80;
        }

        .save-btn {
            display: block;
            margin: 30px auto 10px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .save-btn:hover {
            background-color: #218838;
        }

        .save-btn:disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .username-display {
            margin-right: 10px;
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">ExCard</a>
    <div class="nav-buttons">
        <span class="username-display" id="usernameDisplay">👤</span>
        <a href="#" class="btn" id="logoutBtn">Logout</a>
    </div>
</nav>

<div class="profile-container">
    <h2 class="profile-title">Il tuo profilo</h2>
    <form id="profileForm" novalidate>
        <div class="profile-field">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" disabled required title="Questo campo non può essere vuoto" />
            <button type="button" class="edit-btn" data-field="nome" aria-label="Modifica nome">✏️</button>
        </div>

        <div class="profile-field">
            <label for="cognome">Cognome</label>
            <input type="text" id="cognome" name="cognome" disabled required title="Questo campo non può essere vuoto" />
            <button type="button" class="edit-btn" data-field="cognome" aria-label="Modifica cognome">✏️</button>
        </div>

        <div class="profile-field">
            <label for="indirizzo">Indirizzo</label>
            <input type="text" id="indirizzo" name="indirizzo" disabled required title="Questo campo non può essere vuoto" />
            <button type="button" class="edit-btn" data-field="indirizzo" aria-label="Modifica indirizzo">✏️</button>
        </div>

        <div class="profile-field">
            <label for="citta">Città</label>
            <input type="text" id="citta" name="citta" disabled required title="Questo campo non può essere vuoto" />
            <button type="button" class="edit-btn" data-field="citta" aria-label="Modifica città">✏️</button>
        </div>

        <div class="profile-field">
            <label for="cap">CAP</label>
            <input type="text" id="cap" name="cap" disabled pattern="\d{5}" title="Inserisci un CAP valido (5 cifre)" required />
            <button type="button" class="edit-btn" data-field="cap" aria-label="Modifica CAP">✏️</button>
        </div>

        <div class="profile-field">
            <label for="provincia">Provincia</label>
            <input type="text" id="provincia" name="provincia" disabled pattern="[A-Z]{2}" title="Inserisci una provincia valida (es. RM, MI)" required />
            <button type="button" class="edit-btn" data-field="provincia" aria-label="Modifica provincia">✏️</button>
        </div>

        <div class="profile-field">
            <label for="telefono">Telefono</label>
            <input type="tel" id="telefono" name="telefono" disabled pattern="^(\+?\d{1,3}[- ]?)?\d{8,12}$" title="Inserisci un numero di telefono valido" required />
            <button type="button" class="edit-btn" data-field="telefono" aria-label="Modifica telefono">✏️</button>
        </div>

        <div class="profile-field">
            <label for="dataNascita">Data di nascita</label>
            <input type="date" id="dataNascita" name="dataNascita" disabled required title="Inserisci una data valida" />
            <button type="button" class="edit-btn" data-field="dataNascita" aria-label="Modifica data di nascita">✏️</button>
        </div>

        <button type="submit" class="save-btn" disabled>Salva modifiche</button>
    </form>
</div>

<script src="account.js"></script>
</body>
</html>
