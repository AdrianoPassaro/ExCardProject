<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExCard - Profilo Utente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .profile-field {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color: #f5f5f5;
        }

        .profile-field label {
            flex: 1;
            font-weight: bold;
        }

        .profile-field input {
            flex: 2;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
        }

        .profile-field input:disabled {
            background-color: #f5f5f5;
            border: none;
        }

        .edit-btn {
            margin-left: 10px;
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
        }

        .save-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="profile-container">
    <h2>Il Tuo Profilo</h2>

    <div id="profileFields">
        <!-- Los campos se llenarán dinámicamente con JavaScript -->
    </div>

    <button id="saveChanges" class="save-btn" disabled>Salva Modifiche</button>
</div>

<script src="account.js"></script>
</body>
</html>
