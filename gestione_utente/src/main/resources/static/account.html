<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExCard - Il Tuo Profilo</title>
    <link rel="stylesheet" href="../../../../../css/stile.css">
    <link rel="stylesheet" href="../../../../../css/account.css">
</head>
<body>
<nav class="navbar">
    <a href="homepage.html" class="logo">ExCard</a>
    <div class="nav-buttons">
        <span id="usernameDisplay">👤 Caricamento...</span>
        <a href="#" class="btn" id="logoutBtn">Logout</a>
    </div>
</nav>

<main class="main-content">
    <div class="form-card">
        <h2 class="form-title">Il Tuo Profilo</h2>
        <form id="profileForm">

            <fieldset class="form-section">
                <legend class="section-legend">Dati Personali</legend>
                <div class="grid-layout">
                    <div class="field-group">
                        <label for="nome">Nome</label>
                        <div class="input-wrapper">
                            <input type="text" id="nome" name="nome">
                            <button type="button" class="edit-icon" data-field="nome">✏️</button>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="cognome">Cognome</label>
                        <div class="input-wrapper">
                            <input type="text" id="cognome" name="cognome">
                            <button type="button" class="edit-icon" data-field="cognome">✏️</button>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="dataNascita">Data di Nascita</label>
                        <div class="input-wrapper">
                            <input type="date" id="dataNascita" name="dataNascita">
                            <button type="button" class="edit-icon" data-field="dataNascita">✏️</button>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="telefono">Telefono</label>
                        <div class="input-wrapper">
                            <input type="tel" id="telefono" name="telefono">
                            <button type="button" class="edit-icon" data-field="telefono">✏️</button>
                        </div>
                    </div>
                    <div class="field-group span-full">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email">
                            <button type="button" class="edit-icon" data-field="email">✏️</button>
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend class="section-legend">Indirizzo di spedizione</legend>
                <div class="grid-layout">
                    <div class="field-group span-full">
                        <label for="indirizzo">Indirizzo</label>
                        <div class="input-wrapper">
                            <input type="text" id="indirizzo" name="indirizzo">
                            <button type="button" class="edit-icon" data-field="indirizzo">✏️</button>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="citta">Città</label>
                        <div class="input-wrapper">
                            <input type="text" id="citta" name="citta">
                            <button type="button" class="edit-icon" data-field="citta">✏️</button>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="cap">CAP</label>
                        <div class="input-wrapper">
                            <input type="text" id="cap" name="cap">
                            <button type="button" class="edit-icon" data-field="cap">✏️</button>
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend class="section-legend">Account e Sicurezza</legend>
                <div class="grid-layout">

                    <div class="field-group span-full">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username">
                            <button type="button" class="edit-icon" data-field="username">✏️</button>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="oldPassword">Vecchia Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="oldPassword" name="oldPassword" placeholder="Inserisci attuale per modifiche">
                            <button type="button" class="edit-icon toggle-pass" data-target="oldPassword">
                                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="newPassword">Nuova Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="newPassword" name="newPassword" placeholder="Lascia vuoto per non cambiare">
                            <button type="button" class="edit-icon toggle-pass" data-target="newPassword">
                                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                </div>
            </fieldset>

            <button type="submit" class="action-btn" id="saveBtn" disabled>Salva Modifiche</button>
        </form>
    </div>
</main>

<!--<script src="account.js"></script>-->
</body>
</html>
