<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ExCard — Il tuo profilo</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="account.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard" class="logo-img"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="logo-text" style="display:none">ExCard</span>
    </a>

    <form class="search-form" action="http://localhost:8084/search-results.html" method="get">
        <input type="text" name="q" placeholder="Cerca una carta…" autocomplete="off">
        <button type="submit" aria-label="Cerca">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </form>

    <div class="nav-right">
        <!-- Wallet -->
        <a href="http://localhost:8085/wallet.html" class="wallet-pill" id="walletPill" title="Wallet">
            <span class="wallet-pill-icon">💳</span>
            <span id="walletAmount">—</span>
        </a>

        <!-- Cart -->
        <a href="http://localhost:8087/cart.html" class="cart-icon-btn" title="Carrello">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>

        <!-- User menu -->
        <div class="user-menu">
            <button class="user-menu-trigger" id="userMenuTrigger">
                👤 <span id="usernameDisplay">Utente</span>
                <span class="user-menu-chevron">▼</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
                <a href="http://localhost:8083/collection.html" class="dropdown-item">
                    <span class="dropdown-item-icon">🃏</span> La mia collezione
                </a>
                <a href="http://localhost:8086/orders.html" class="dropdown-item">
                    <span class="dropdown-item-icon">📦</span> I miei ordini
                </a>
                <a href="http://localhost:8085/wallet.html" class="dropdown-item">
                    <span class="dropdown-item-icon">💳</span> Wallet
                </a>
                <hr class="dropdown-divider">
                <button class="dropdown-item logout" id="logoutBtn">
                    <span class="dropdown-item-icon">🚪</span> Logout
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="page-header-inner">
        <h1 class="page-title">Il tuo Profilo</h1>
        <p class="page-subtitle">Gestisci i tuoi dati personali</p>
    </div>
</div>

<!-- CONTENT -->
<div class="profile-layout">

    <!-- PERSONAL DATA -->
    <div class="profile-section" id="sectionPersonal">
        <div class="section-header">
            <h2 class="section-title">Dati personali</h2>
            <button class="section-edit-btn" data-section="personal" id="editPersonalBtn">Modifica</button>
        </div>
        <div class="profile-grid">
            <div class="pf">
                <label class="pf-label">Nome</label>
                <input type="text" id="nome" class="pf-input" disabled>
            </div>
            <div class="pf">
                <label class="pf-label">Cognome</label>
                <input type="text" id="cognome" class="pf-input" disabled>
            </div>
            <div class="pf">
                <label class="pf-label">Data di nascita</label>
                <input type="date" id="dataNascita" class="pf-input" disabled>
            </div>
            <div class="pf">
                <label class="pf-label">Telefono</label>
                <input type="tel" id="telefono" class="pf-input" disabled>
            </div>
        </div>
        <div class="section-actions" id="actionsPersonal" style="display:none">
            <button class="btn-save" id="savePersonalBtn">Salva modifiche</button>
            <button class="btn-cancel" id="cancelPersonalBtn">Annulla</button>
        </div>
        <div class="section-error" id="errorPersonal" style="display:none"></div>
    </div>

    <!-- ADDRESS -->
    <div class="profile-section" id="sectionAddress">
        <div class="section-header">
            <h2 class="section-title">Indirizzo di spedizione</h2>
            <button class="section-edit-btn" data-section="address" id="editAddressBtn">Modifica</button>
        </div>
        <div class="profile-grid">
            <div class="pf pf-full">
                <label class="pf-label">Indirizzo</label>
                <input type="text" id="indirizzo" class="pf-input" disabled>
            </div>
            <div class="pf">
                <label class="pf-label">Città</label>
                <input type="text" id="citta" class="pf-input" disabled>
            </div>
            <div class="pf">
                <label class="pf-label">CAP</label>
                <input type="text" id="cap" class="pf-input" disabled>
            </div>
            <div class="pf">
                <label class="pf-label">Provincia</label>
                <input type="text" id="provincia" class="pf-input" disabled maxlength="2"
                       style="text-transform:uppercase">
            </div>
        </div>
        <div class="section-actions" id="actionsAddress" style="display:none">
            <button class="btn-save" id="saveAddressBtn">Salva modifiche</button>
            <button class="btn-cancel" id="cancelAddressBtn">Annulla</button>
        </div>
        <div class="section-error" id="errorAddress" style="display:none"></div>
    </div>

    <!-- ACCOUNT -->
    <div class="profile-section" id="sectionAccount">
        <div class="section-header">
            <h2 class="section-title">Account</h2>
        </div>
        <div class="profile-grid">
            <div class="pf pf-full">
                <label class="pf-label">Username</label>
                <input type="text" id="username-display" class="pf-input" disabled>
            </div>
        </div>
        <p class="account-note">Per modificare username o password contatta il supporto.</p>
    </div>

</div>

<script src="account.js"></script>
</body>
</html>
