<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Carrello — ExCard</title>
    <link rel="stylesheet" href="cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard Logo" class="logo-img">
    </a>
    <div class="nav-buttons">
        <a href="http://localhost:8081/account.html" class="btn btn-user" id="usernameDisplay">👤 Utente</a>

        <!-- CART ICON WITH BADGE -->
        <a href="cart.html" class="cart-icon-btn" title="Carrello">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>

        <button class="btn btn-logout" id="logoutBtn">Logout</button>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="page-header-inner">
        <div class="page-header-text">
            <h1 class="page-title">Il mio Carrello</h1>
            <p class="page-subtitle" id="cartStats">Caricamento…</p>
        </div>
    </div>
</div>

<!-- MAIN LAYOUT -->
<div class="cart-layout">

    <!-- LEFT: ITEMS LIST -->
    <div class="cart-items-col">
        <div id="cartList"></div>

        <!-- EMPTY STATE -->
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">🛒</div>
            <p class="empty-title">Il carrello è vuoto</p>
            <p class="empty-sub">Aggiungi qualche carta dal marketplace</p>
        </div>
    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="cart-summary" id="cartSummary" style="display:none">
        <h2 class="summary-title">Riepilogo</h2>

        <div class="summary-row">
            <span>Articoli</span>
            <span id="summaryCount">0</span>
        </div>
        <div class="summary-row summary-total">
            <span>Totale</span>
            <span id="summaryTotal">€ 0.00</span>
        </div>

        <button class="btn-checkout" id="checkoutBtn">
            Procedi al pagamento
        </button>
        <button class="btn-clear" id="clearCartBtn">
            Svuota carrello
        </button>
    </div>

</div>

<!-- ── DEBUG PANEL ── -->
<div class="debug-panel" id="debugPanel">
    <div class="debug-header" id="debugToggle">
        <span>🛠 Debug — Aggiungi carta al carrello</span>
        <span class="debug-arrow" id="debugArrow">▼</span>
    </div>
    <div class="debug-body" id="debugBody">
        <div class="debug-grid">
            <div class="debug-field">
                <label>Listing ID</label>
                <input type="text" id="dbListingId" placeholder="listing-001">
            </div>
            <div class="debug-field">
                <label>Card ID</label>
                <input type="text" id="dbCardId" placeholder="id dal catalog">
            </div>
            <div class="debug-field">
                <label>Seller ID</label>
                <input type="text" id="dbSellerId" placeholder="seller42">
            </div>
            <div class="debug-field">
                <label>Condizione</label>
                <select id="dbCondition">
                    <option value="Near Mint">Near Mint</option>
                    <option value="Lightly Played">Lightly Played</option>
                    <option value="Moderately Played">Moderately Played</option>
                    <option value="Heavily Played">Heavily Played</option>
                </select>
            </div>
            <div class="debug-field">
                <label>Prezzo (€)</label>
                <input type="number" id="dbPrice" placeholder="9.99" min="0" step="0.01">
            </div>
            <div class="debug-field">
                <label>Quantità</label>
                <input type="number" id="dbQuantity" placeholder="1" min="1" value="1">
            </div>
        </div>
        <div class="debug-actions">
            <button class="debug-btn-add" id="debugAdd">➕ Aggiungi al carrello</button>
            <span class="debug-feedback" id="debugFeedback"></span>
        </div>
    </div>
</div>

<script src="cart.js"></script>
</body>
</html>
