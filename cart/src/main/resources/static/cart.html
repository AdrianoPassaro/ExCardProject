<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Carrello</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        /* NAVBAR */
        .navbar {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        /* CONTENUTO */
        .container {
            padding: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .cart-item img {
            width: 80px;
            margin-right: 20px;
        }

        .info {
            flex: 1;
        }

        .price {
            font-weight: bold;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove {
            background: red;
            color: white;
        }

        .clear {
            background: black;
            color: white;
            margin-top: 20px;
        }

        .checkout {
            background: green;
            color: white;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>
        <a href="home.html">Home</a>
        <a href="cart.html">Carrello</a>
        <a href="orders.html">Ordini</a>
    </div>
    <div id="username"></div>
</div>

<div class="container">
    <h2>Il tuo carrello</h2>
    <div id="cart-list"></div>

    <button class="clear" onclick="clearCart()">Svuota carrello</button>
    <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script src="cart.js"></script>
</body>
</html>
