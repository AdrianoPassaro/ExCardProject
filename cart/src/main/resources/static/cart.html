<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Carrello — ExCard</title>
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="navbar-shared.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="http://localhost:8080/homepage.html" class="logo">
        <img src="logo.png" alt="ExCard Logo" class="logo-img" onerror="this.style.display='none'">
    </a>

    <form class="search-form" action="http://localhost:8084/search-results.html" method="get">
        <input type="text" name="q" placeholder="Cerca una carta…" autocomplete="off">
        <button type="submit" aria-label="Cerca">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </form>

    <div class="nav-buttons">
        <a href="http://localhost:8085/wallet.html" class="wallet-pill" id="walletPill">
            <span>💳</span><span id="walletAmount">—</span>
        </a>
        <a href="http://localhost:8087/cart.html" class="cart-icon-btn" title="Carrello">
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>
        <div class="user-menu-wrap">
            <button class="user-menu-trigger" id="userMenuTrigger">
                <span id="usernameDisplay">Utente</span>
                <span class="chevron">▼</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
                <a href="http://localhost:8081/account.html" class="dd-item">👤 Profilo</a>
                <a href="http://localhost:8083/collection.html" class="dd-item">🃏 Collezione</a>
                <a href="http://localhost:8086/orders.html" class="dd-item">📦 Ordini</a>
                <a href="http://localhost:8088/trades.html" class="dd-item">🔄 Scambi</a>
                <a href="http://localhost:8085/wallet.html" class="dd-item">💳 Wallet</a>
                <hr class="dd-divider">
                <button class="dd-item dd-logout" id="logoutBtn">🚪 Logout</button>
            </div>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="page-header-inner">
        <div class="page-header-text">
            <h1 class="page-title">Il mio Carrello</h1>
            <p class="page-subtitle" id="cartStats">Caricamento…</p>
        </div>
    </div>
</div>

<!-- MAIN LAYOUT -->
<div class="cart-layout">

    <!-- LEFT: ITEMS LIST -->
    <div class="cart-items-col">
        <div id="cartList"></div>

        <!-- EMPTY STATE -->
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">🛒</div>
            <p class="empty-title">Il carrello è vuoto</p>
            <p class="empty-sub">Aggiungi qualche carta dal marketplace</p>
        </div>
    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="cart-summary" id="cartSummary" style="display:none">
        <h2 class="summary-title">Riepilogo</h2>

        <div class="summary-row">
            <span>Articoli</span>
            <span id="summaryCount">0</span>
        </div>
        <div class="summary-row">
            <span>Spedizioni (<span id="summarySellerCount">0</span>× € 3.00)</span>
            <span id="summaryShipping">€ 0.00</span>
        </div>
        <div class="summary-row summary-total">
            <span>Totale stimato</span>
            <span id="summaryTotal">€ 0.00</span>
        </div>

        <button class="btn-checkout" id="checkoutBtn">
            Procedi al pagamento
        </button>
        <button class="btn-clear" id="clearCartBtn">
            Svuota carrello
        </button>
    </div>

</div>

<script src="cart.js"></script>
<script src="navbar.js"></script>
</body>
</html>
